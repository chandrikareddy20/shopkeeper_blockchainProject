<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopkeeper - Business Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <div class="login-header">
                <div class="logo-circle">🏪</div>
                <h1>SHOPKEEPER</h1>
                <p class="subtitle">
                    Tamper-resistant business management with blockchain-grade security
                </p>
            </div>

            <form id="loginForm" class="login-form">
                <label for="username">👤 Username</label>
                <input type="text" id="username" placeholder="Enter username" required>

                <label for="password">🔐 Password</label>
                <input type="password" id="password" placeholder="Enter password" required>

                <label for="role">👨‍💼 Select Role</label>
                <select id="role" required>
                    <option value="">-- Choose Role --</option>
                    <option value="owner">Owner (Full Access)</option>
                    <option value="staff">Staff (Billing Only)</option>
                </select>

                <button type="submit">🔓 Login</button>

                <div id="errorMessage"></div>
            </form>

            <div class="login-hint">
                <strong>Demo credentials</strong><br>
                Owner: <code>owner / 1234</code><br>
                Staff: <code>staff / 1234</code>
            </div>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
