<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billing - Shopkeeper</title>
    <link rel="stylesheet" href="style.css">
</head>

<body style="align-items: flex-start; padding-top: 20px;">
    <div class="dashboard-container" style="max-width: 900px;">
        <!-- Header -->
        <div class="dashboard-header">
            <div>
                <h2>💰 Billing Counter</h2>
                <p style="color: #999; font-size: 13px; margin-top: 5px;">Fast & Secure Transaction Recording</p>
            </div>
            <div class="user-info">
                <span id="userDisplay">Staff</span>
                <button class="logout-btn" onclick="logout()">🚪 Logout</button>
            </div>
        </div>

        <!-- Quick Stats -->
        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px;">
            <div style="background: #4a76d4; color: white; padding: 15px; border-radius: 8px;">
                <div style="font-size: 12px; opacity: 0.9;">Today's Sales</div>
                <div style="font-size: 22px; font-weight: bold;" id="todaysSales">₹0</div>
            </div>
            <div style="background: #4a76d4; color: white; padding: 15px; border-radius: 8px;">
                <div style="font-size: 12px; opacity: 0.9;">Transactions</div>
                <div style="font-size: 22px; font-weight: bold;" id="txCount">0</div>
            </div>
            <div style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: white; padding: 15px; border-radius: 8px;">
                <div style="font-size: 12px; opacity: 0.9;">Avg Amount</div>
                <div style="font-size: 22px; font-weight: bold;" id="avgAmount">₹0</div>
            </div>
        </div>

        <!-- Main Billing Form -->
        <div class="form-section">
            <h3 style="border: none; margin-bottom: 20px; color: #333;">📝 Add Sale Record</h3>

            <form id="billingForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="product">Product / Item Name</label>
                        <input type="text" id="product" placeholder="e.g., Rice, Oil, Sugar" required>
                    </div>

                    <div class="form-group">
                        <label for="qty">Quantity</label>
                        <input type="number" id="qty" placeholder="e.g., 2" min="0.01" step="0.01" required>
                    </div>

                    <div class="form-group">
                        <label for="price">Price per Unit (₹)</label>
                        <input type="number" id="price" placeholder="e.g., 500" min="0.01" step="0.01" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="paymentMode">Payment Mode</label>
                        <select id="paymentMode" required>
                            <option value="">-- Select Payment Mode --</option>
                            <option value="Cash">💵 Cash</option>
                            <option value="UPI">📱 UPI</option>
                            <option value="Card">💳 Card</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="totalAmount">Total Amount (Auto)</label>
                        <input type="text" id="totalAmount" placeholder="₹0" readonly style="background: #f0f0f0; color: #333; font-weight: bold;">
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 20px;">
                    <button type="submit" style="background: #4a76d4;">
                        ✅ Confirm & Record Sale
                    </button>
                    <button type="reset" style="background: #999;">
                        🔄 Clear Form
                    </button>
                </div>
            </form>

            <div id="msg"></div>
        </div>

        <!-- Recent Transactions -->
        <div class="section">
            <h3>📜 Today's Transactions</h3>
            <div id="transactionList" style="background: white; border-radius: 8px; max-height: 400px; overflow-y: auto; border: 1px solid #eee;">
                <p style="padding: 20px; text-align: center; color: #999;">No transactions yet. Record your first sale above.</p>
            </div>
        </div>

        <!-- Navigation -->
        <div style="text-align: center; padding: 20px;">
            <p style="color: #999; font-size: 12px; margin-bottom: 10px;">Staff Tools</p>
            <a href="Transaction.html" style="color: #4a76d4; text-decoration: none; margin: 0 10px;">📋 All Transactions</a>
        </div>
    </div>

    <script src="billing.js"></script>
</body>

</html>
